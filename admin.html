<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>لوحة التحكم — Wedding Invite</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
body{background:#0d0a04;color:#E8D5A3;font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
h1{color:#C9A84C;font-size:1.6rem;margin-bottom:2rem;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;width:100%;max-width:700px;margin-bottom:2rem}
.card{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);border-radius:12px;padding:1.5rem;text-align:center}
.card .num{font-size:2.5rem;font-weight:700;color:#C9A84C;display:block;margin-bottom:.3rem}
.card .lbl{font-size:.8rem;opacity:.6}
#dashboard{width:100%;max-width:700px}
.refresh{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:#C9A84C;border-radius:8px;padding:.5rem 1.2rem;cursor:pointer;font-size:.8rem;margin-bottom:1rem}
.note{font-size:.72rem;color:#C9A84C;opacity:.7;text-align:center;margin-top:.8rem;line-height:1.6;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-radius:8px;padding:.8rem}
</style>
</head>
<body>

<!-- Auth handled by /api/admin HTTP Basic Auth — no client-side password needed -->
<div id="dashboard">
  <h1>💍 إحصائيات الموقع</h1>
  <button class="refresh" onclick="loadStats()">🔄 تحديث</button>
  <div class="cards">
    <div class="card"><span class="num" id="s-visits">...</span><span class="lbl">إجمالي الزوار</span></div>
    <div class="card"><span class="num" id="s-pdfs">...</span><span class="lbl">PDF تم تحميله</span></div>
    <div class="card"><span class="num" id="s-unlocked">...</span><span class="lbl">مدفوعون موثّقون</span></div>
    <div class="card"><span class="num" id="s-rate">...</span><span class="lbl">معدل التحويل</span></div>
  </div>
  <p style="font-size:.7rem;opacity:.4;text-align:center">آخر تحديث: <span id="s-time"></span></p>
  <p id="stats-note" class="note" style="display:none">
    ⚠️ الإحصائيات تُعدّ تقريبية — تعتمد على سجلات Vercel.<br>
    للإحصائيات الدقيقة، يُنصح بربط Vercel KV أو Supabase.
  </p>
</div>

<script>
async function loadStats(){
  const now = new Date().toLocaleString('ar');
  try{
    const r = await fetch('/api/stats', {credentials:'include'});
    if(r.ok){
      const d = await r.json();
      document.getElementById('s-visits').textContent   = Number(d.visits||0).toLocaleString('ar');
      document.getElementById('s-pdfs').textContent     = Number(d.pdfs||0).toLocaleString('ar');
      document.getElementById('s-unlocked').textContent = Number(d.unlocked||0).toLocaleString('ar');
      document.getElementById('s-rate').textContent     = d.rate||'—';
    } else {
      showPlaceholders();
    }
  }catch(e){ showPlaceholders(); }
  document.getElementById('s-time').textContent = now;
}

function showPlaceholders(){
  ['s-visits','s-pdfs','s-unlocked','s-rate'].forEach(id=>{
    document.getElementById(id).textContent='—';
  });
  document.getElementById('stats-note').style.display='block';
}

loadStats();
</script>
</body>
</html>
